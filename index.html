<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="./js/script.js" defer type="module"></script>
    <script src="https://kit.fontawesome.com/f840aaec68.js" crossorigin="anonymous"></script>
    <title>Calculadora IMC</title>
</head>
<body>

    <div class="alert-error">
        Digite somente números
    </div>
    <div class="container">
        <main class="card">
            <form>
                <h1 class="title">Cálculo de IMC</h1>
                <div class="input-wrapper">
                    <label for="weight">Peso (kg)</label>
                    <input id="weight" type="text" placeholder="60">
                </div>

                <div class="input-wrapper">
                    <label for="height">Altura (cm)</label>
                    <input id="height" type="text" placeholder="165">
                 </div>
                
                <button type="submit">
                    Calcular IMC <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </main>
    </div>

    <div class="modal-wrapper">
        <div class="modal card">
            <h2 class="tittle">
                <button class="close"><i class="fa-solid fa-xmark"></i></i></button>
                <span></span>
            </h2>
        </div>
    </div>

</body>
</html>
